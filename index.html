<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Några ord att bära med sig</title>

    <link rel="stylesheet" href="style.css">

    <!-- 🌿 Default till kaka01 om ingen ID finns -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
            window.location.replace("?id=kaka01");
        }
    </script>
</head>

<body>
    <div class="container">
        <h1>Några ord att bära med sig</h1>

        <div id="quote" class="quote">Ett ögonblick...</div>

        <button onclick="newQuote()">Ett annat perspektiv</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
